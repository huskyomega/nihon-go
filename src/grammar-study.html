<!DOCTYPE html>
<html lang="zh-Hant" data-theme="cupcake">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文法學習 — NihonGo</title>
  <link href="assets/vendor/daisyui.min.css" rel="stylesheet">
  <script src="assets/vendor/tailwind.js"></script>
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .speak-btn {
      width: 2.5rem;
      height: 2.5rem;
      min-height: unset;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body class="min-h-screen bg-base-200">

  <header class="navbar bg-base-100 shadow-sm">
    <div class="navbar-start">
      <a href="index.html" class="btn btn-ghost text-base">← 返回</a>
    </div>
    <div class="navbar-center">
      <span class="text-lg font-bold">文法學習</span>
    </div>
    <div class="navbar-end px-4">
      <label class="swap swap-rotate">
        <input type="checkbox" id="theme-toggle">
        <span class="swap-on text-xl">🌙</span>
        <span class="swap-off text-xl">☀️</span>
      </label>
    </div>
  </header>

  <main class="container mx-auto px-4 py-6 max-w-lg">

    <!-- 單元選擇 -->
    <div class="mb-3">
      <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide" id="unit-bar">
        <button class="btn btn-xs btn-secondary shrink-0 unit-btn" data-unit="">全部</button>
      </div>
    </div>

    <!-- 進度 -->
    <div class="flex items-center justify-end mb-2">
      <span class="text-sm text-base-content/60" id="progress-label">— / —</span>
    </div>
    <input type="range" class="range range-secondary range-xs w-full mb-6" id="progress-bar" min="0" max="0" value="0" step="1">

    <!-- 文法卡 -->
    <div class="card bg-secondary text-secondary-content shadow-xl mb-6" id="card-scene">
      <div class="card-body items-center text-center gap-2 py-8">
        <div class="badge badge-outline badge-sm mb-1" id="card-level"></div>
        <div class="text-2xl font-bold" id="card-pattern"></div>
        <div class="text-base font-semibold opacity-90" id="card-meaning"></div>
        <div class="divider my-0 opacity-30"></div>
        <div class="text-xs opacity-70 leading-relaxed px-2" id="card-explanation"></div>
        <div id="card-examples-container" class="w-full mt-1"></div>
      </div>
    </div>

    <!-- 上一個 / 下一個 -->
    <div class="flex gap-4 justify-center" id="nav-btns">
      <button class="btn btn-outline flex-1" id="btn-prev">← 上一個</button>
      <button class="btn btn-secondary flex-1" id="btn-next">下一個 →</button>
    </div>

    <!-- 錯誤畫面 -->
    <div class="hidden card bg-base-100 shadow-xl" id="error-screen">
      <div class="card-body items-center text-center py-10">
        <div class="text-5xl mb-4">⚠️</div>
        <h2 class="card-title text-xl mb-2">無法載入資料</h2>
        <p class="text-base-content/60 text-sm mb-4">請用本機伺服器開啟，而非直接點開檔案。</p>
        <div class="mockup-code text-left text-xs w-full max-w-xs">
          <pre><code>cd src
python3 -m http.server 8080</code></pre>
        </div>
        <p class="text-base-content/40 text-xs mt-3">然後開啟 http://localhost:8080</p>
      </div>
    </div>

  </main>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/tts.js"></script>
  <script src="assets/js/grammar-study.js"></script>
</body>
</html>
